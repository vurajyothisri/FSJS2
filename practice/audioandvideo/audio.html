<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio tag</title>
</head>
<body>
    <h1 align="center"> AUDIO TAG</h1>
    <audio
    controls
    src="/audio.mp3">
        
</audio>

    <h2>The attributs in audio tag</h2>
        <ol>
            <li>controls:It offers the user to playback,mute etc he can anything</li>
            <li>src:Source or address of the video</li>
            <li>autoplay:It will play video autommatically after loading</li>
            <li>loop:It will you to play over and over again</li>
            <li>type:Video type llike mp3 or mp4</li>
        </ol>
</body>
</html>
